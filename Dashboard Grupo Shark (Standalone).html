  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

>\n\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ CAMPANHAS PAGAS · META ADS ============ -->\n      <sc-if value=\"{{ showAnalise }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"font-size:11px;letter-spacing:1.6px;color:#5E7d8a;font-weight:600;margin:0 0 12px\">IMPACTO DAS CAMPANHAS PAGAS<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(2,1fr);grid-auto-rows:1fr;gap:18px\">\n\n          <!-- Card A: cobertura -->\n          <div class=\"gs-printforce\" style=\"background:#0e3142;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:24px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n              <span style=\"width:34px;height:34px;border-radius:9px;background:rgba(62,107,214,.18);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#3E6BD6\" stroke-width=\"1.6\"><path d=\"M3 17v-4M8 17V7M13 17v-7M18 17V4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">Cobertura de Investimento<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:12px\">\n              <span style=\"font-family:'Space Grotesk';font-weight:700;font-size:38px;color:#3E6BD6;line-height:1\">{{ adsBrandsLabel }}<\u002Fspan>\n              <span style=\"font-size:13px;color:#cdd9df;line-height:1.35\">marcas ativaram<br>campanhas pagas<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;color:#8FA9B6;line-height:1.55;margin-top:16px;text-align:justify\">Apenas <b style=\"color:#E8F0F4\">Disma, Shark Máquinas e Agricase<\u002Fb> ativaram campanhas no período. A verba foi <b style=\"color:#E8F0F4\">majoritariamente focada em conversão<\u002Fb>, ignorando atração e descoberta de novos públicos.<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.07);font-size:12px;color:#8FA9B6\">\n              <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#3E6BD6\"><\u002Fspan>Fim <b style=\"color:#E8F0F4;font-family:'Space Grotesk'\">{{ adsMixFim }}<\u002Fb><\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#F4B740\"><\u002Fspan>Meio <b style=\"color:#E8F0F4;font-family:'Space Grotesk'\">{{ adsMixMeio }}<\u002Fb><\u002Fspan>\n              <span style=\"display:flex;align-items:center;gap:6px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#5E7d8a\"><\u002Fspan>Topo <b style=\"color:#E8F0F4;font-family:'Space Grotesk'\">{{ adsMixTopo }}<\u002Fb><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Card B: funil -->\n          <div class=\"gs-printforce\" style=\"background:#0e3142;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:24px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n              <span style=\"width:34px;height:34px;border-radius:9px;background:rgba(244,183,64,.16);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#F4B740\" stroke-width=\"1.6\"><path d=\"M2 3h16l-6 7v6l-4 2v-8z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">Distribuição por Etapa de Funil<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:auto;margin-bottom:auto\">\n              <sc-for list=\"{{ funnel }}\" as=\"f\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:14px\">\n                  <div style=\"width:104px;flex:none;font-size:13px;color:#cdd9df\">{{ f.label }}<\u002Fdiv>\n                  <div style=\"flex:1;height:28px;background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden;position:relative\">\n                    <div style=\"height:100%;width:{{ f.barW }};background:{{ f.color }};border-radius:8px;transform-origin:left;animation:gsGrow .7s cubic-bezier(.2,.8,.3,1)\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:26px;flex:none;text-align:right;font-family:'Space Grotesk';font-weight:700;font-size:18px;color:{{ f.color }}\">{{ f.count }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#5E7d8a;margin-top:14px\">nº de campanhas por etapa<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Card C: impacto seguidores -->\n          <div class=\"gs-printforce\" style=\"background:#0e3142;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:24px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n              <span style=\"width:34px;height:34px;border-radius:9px;background:rgba(240,97,109,.15);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#F0616D\" stroke-width=\"1.6\"><path d=\"M14 7l-4 4-3-3-5 5\"><\u002Fpath><path d=\"M14 11V7h-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">Impacto em Seguidores<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#cdd9df;line-height:1.6;margin:auto 0;text-align:justify\">A baixíssima presença de campanhas de <b style=\"color:#fff\">Topo de Funil<\u002Fb> (apenas 1 de 11, da <b style=\"color:#fff\">Shark Máquinas<\u002Fb>) impactou diretamente o desempenho na meta de Ganho de Seguidores, deixando <b style=\"color:#F0616D\">{{ segBelow70Label }} abaixo de 70%<\u002Fb>. Sem campanhas de atração para trazer tráfego pago qualificado, o crescimento de seguidores passa a depender majoritariamente do ritmo orgânico.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Card D: impacto engajamento -->\n          <div class=\"gs-printforce\" style=\"background:#0e3142;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:24px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n              <span style=\"width:34px;height:34px;border-radius:9px;background:rgba(62,107,214,.18);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#3E6BD6\" stroke-width=\"1.6\"><path d=\"M4 10a6 6 0 1112 0 6 6 0 01-12 0z\"><\u002Fpath><path d=\"M10 7v3l2 2\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"font-family:'Space Grotesk';font-weight:600;font-size:15px\">Impacto no Engajamento<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#cdd9df;line-height:1.6;margin:auto 0;text-align:justify\">O foco quase exclusivo em campanhas de <b style=\"color:#fff\">Fim de Funil<\u002Fb> limita o relacionamento e a interação qualificada, o que se reflete na dificuldade de bater as metas de engajamento orgânico. Além disso, a ausência de campanhas de <b style=\"color:#fff\">Topo e Meio de Funil<\u002Fb> quebra o fluxo de nutrição, dificultando a alimentação de públicos quentes para as campanhas de conversão. No período, apenas a <b style=\"color:#fff\">Agricase<\u002Fb> investiu em estratégias de <b style=\"color:#fff\">Meio de Funil<\u002Fb>.<\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============================ DOCUMENTO PARA IMPRESSÃO / PDF ============================ -->\n<sc-if value=\"{{ showPrint }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"gs-printdoc\" style=\"background:#e7edf1;min-height:100vh;padding:26px 18px 60px\">\n\n  <div class=\"gs-print-toolbar\" style=\"max-width:1000px;margin:0 auto 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;background:#082533;border-radius:12px;padding:14px 20px\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <img src=\"278252fa-d4e7-415c-b55e-bb634e3e5bd3\" alt=\"Grupo Shark\" style=\"height:26px;width:auto;display:block\">\n      <span style=\"font-size:12.5px;color:#9fb5c0\">Modo de impressão · use Ctrl/Cmd + P ou o botão ao lado<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:10px\">\n      <button onclick=\"{{ exitPrint }}\" style=\"font-family:inherit;font-size:12.5px;font-weight:600;color:#cdd9df;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:9px 15px;border-radius:8px;cursor:pointer\">Voltar ao dashboard<\u002Fbutton>\n      <button onclick=\"{{ runPrint }}\" style=\"font-family:inherit;font-size:12.5px;font-weight:600;color:#fff;background:#0E338E;border:none;padding:9px 16px;border-radius:8px;cursor:pointer\">Imprimir / Salvar PDF<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PÁGINA: CAPA -->\n  <section class=\"gs-page\" style=\"background:#fff;border-radius:8px;padding:0;max-width:1000px;margin:0 auto 22px;box-shadow:0 2px 14px rgba(0,0,0,.12);overflow:hidden\">\n    <div class=\"gs-printforce\" style=\"background:radial-gradient(900px 500px at 80% -20%, rgba(62,107,214,.35), transparent 60%), #082533;padding:80px 56px;min-height:520px;display:flex;flex-direction:column;justify-content:center\">\n      <img src=\"278252fa-d4e7-415c-b55e-bb634e3e5bd3\" alt=\"Grupo Shark\" style=\"width:280px;height:auto;display:block\">\n      <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:44px;color:#fff;margin-top:40px;line-height:1.1\">Relatório Consolidado<br>de Performance<\u002Fdiv>\n      <div style=\"font-size:17px;color:#7Fd0f0;font-weight:500;margin-top:18px;letter-spacing:.5px\">Redes Sociais · Janeiro a Maio de 2026<\u002Fdiv>\n      <div style=\"margin-top:46px;display:flex;gap:38px;flex-wrap:wrap\">\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:30px;color:#fff\">{{ marcaCount }}<\u002Fdiv><div style=\"font-size:12px;color:#9fb5c0;letter-spacing:.5px\">MARCAS<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:30px;color:#fff\">{{ totalMetas }}<\u002Fdiv><div style=\"font-size:12px;color:#9fb5c0;letter-spacing:.5px\">METAS AVALIADAS<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:30px;color:#fff\">3<\u002Fdiv><div style=\"font-size:12px;color:#9fb5c0;letter-spacing:.5px\">INDICADORES / MARCA<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PÁGINA: VISÃO GERAL -->\n  <section class=\"gs-page\" style=\"background:#fff;border-radius:8px;padding:30px 34px;max-width:1000px;margin:0 auto 22px;box-shadow:0 2px 14px rgba(0,0,0,.12)\">\n    <div style=\"margin-bottom:20px\">\n      <div style=\"font-size:11px;letter-spacing:2px;color:#3E6BD6;font-weight:600\">VISÃO GERAL<\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:22px;color:#0a2030;margin-top:3px\">Performance Consolidada<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"gs-avoid\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px\">\n      <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n        <div class=\"gs-printforce\" style=\"background:#0e3142;border-radius:14px;padding:20px;position:relative;overflow:hidden\">\n          <div style=\"position:absolute;top:0;left:0;width:3px;he t:700;font-size:28px;color:#F4B740;margin-top:8px\">19<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#0c2a38;border-radius:12px;padding:16px 18px;position:relative;overflow:hidden\"><div style=\"position:absolute;top:0;left:0;width:3px;height:100%;background:#34D27B\"><\u002Fdiv><div style=\"font-size:11px;letter-spacing:.6px;color:#8FA9B6;font-weight:600;text-transform:uppercase\">Taxa de Erros<\u002Fdiv><div style=\"font-family:'Space Grotesk';font-weight:700;font-size:28px;color:#34D27B;margin-top:8px\">1,5%<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11px;color:#5E7d8a;line-height:1.5;margin-top:14px\">Contabiliza apenas erros técnicos/operacionais cometidos pela MMT; pedidos de melhorias ou trocas de preferência do cliente não são considerados erros.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PÁGINA: CAMPANHAS PAGAS -->\n  <section class=\"gs-page\" style=\"background:#fff;border-radius:8px;padding:30px 34px;max-width:1000px;margin:0 auto 22px;box-shadow:0 2px 14px rgba(0,0,0,.12)\">\n    <div style=\"margin-bottom:18px\">\n      <div style=\"font-size:11px;letter-spacing:2px;color:#3E6BD6;font-weight:600\">CAMPANHAS PAGAS<\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk';font-weight:700;font-size:20px;color:#0a2030;margin-top:3px\">Meta Ads · Impacto nas Metas<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n      <div class=\"gs-printforce gs-avoid\" style=\"background:#0e3142;border-radius:14px;padding:22px\">\n        <div style=\"font-family:'Space Grotesk';font-weight:600;font-size:14px;color:#E8F0F4;margin-bottom:12px\">Cobertura de Investimento<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"font-family:'Space Grotesk';font-weight:700;font-size:34px;color:#3E6BD6;line-height:1\">{{ adsBrandsLabel }}<\u002Fspan><span style=\"font-size:12.5px;color:#cdd9df;line-height:1.35\">marcas ativaram<br>camp MIX_LABELS=['Reels','Carrosséis','Artes Únicas'];\n  pmRow(name,arr){\n    return { name,\n      segs:arr.map((v,i)=>({w:Math.max(0,v)+'%',color:this.POSTMIX_COLORS[i]})),\n      reels:this.fmtPct(arr[0]), carros:this.fmtPct(arr[1]), artes:this.fmtPct(arr[2]),\n    };\n  }\n\n  buildBrand(active){\n    const PM=this.postMixData();\n    const card=(title,mm,unit,sub,scope)=>{ const c=this.colorFor(mm.pct); return {\n      title, color:c, chipBg:c+'22', pctLabel:this.fmtPct(mm.pct),\n      realizado:mm.real, meta:mm.meta, subLabel:sub, scopeLabel:scope||'da meta de maio',\n      barW:Math.min(100,mm.pct)+'%', status:this.statusFor(mm.pct)\n    };};\n    let gc=0; ['seg','pub','eng'].forEach(k=>{if(active.m[k].pct>=100)gc++;});\n    const sBg = gc>=2?'rgba(52,210,123,.12)':gc===1?'rgba(244,183,64,.12)':'rgba(240,97,109,.12)';\n    const sBd = gc>=2?'rgba(52,210,123,.35)':gc===1?'rgba(244,183,64,.35)':'rgba(240,97,109,.35)';\n    const sCol = gc>=2?this.GREEN:gc===1?this.YELLOW:this.RED;\n    const ab={\n      key:active.key, name:active.name, greenCount:gc, statusBg:sBg, statusBorder:sBd, statusColor:sCol,\n      metricCards:[\n        card('Ganho de Seguidores',active.m.seg,'',  'Realizado até maio · meta anual '+active.m.seg.meta),\n        card('Total de Publicações',active.m.pub,'', 'Realizado até maio · meta anual '+active.m.pub.meta),\n        card('Taxa de Engajamento',active.m.eng,'',  'Realizado em maio · meta anual '+active.m.eng.meta, 'da meta anual'),\n      ],\n      hasAds:!!active.ads, noAds:!active.ads,\n    };\n    if(active.ads){\n      const a=active.ads;\n      const vTopo=this.parseBRL(a.topo), vMeio=this.parseBRL(a.meio), vFim=this.parseBRL(a.fim);\n      const vTot=vTopo+vMeio+vFim||1;\n      const pctFim=Math.round(vFim/vTot*100);\n      ab.adsPctFim=pctFim+'%';\n      ab.adsDonut=this.donut([{v:vTopo,c:'#5E7d8a'},{v:vMeio,c:'#F4B740'},{v:vFim,c:'#3E6BD6'}],58,16);\n      ab.adsRows=[\n        {label:'Topo de Funil', value:a.topo, color:'#5E7d8a  return { rows, subtitle:(mk==='eng'?'Cumprimento da meta anual · ':'Cumprimento da meta de maio · ')+mLabel };\n  }\n\n  donut(segs, r, sw){\n    r=r||52; sw=sw||13; const size=(r+sw)*2; const C=2*Math.PI*r;\n    const tot=segs.reduce((s,x)=>s+x.v,0)||1; let acc=0;\n    const ch=[React.createElement('circle',{key:'bg',cx:size/2,cy:size/2,r,fill:'none',stroke:'rgba(255,255,255,.06)',strokeWidth:sw})];\n    segs.forEach((s,i)=>{ const f=s.v/tot, len=f*C;\n      ch.push(React.createElement('circle',{key:i,cx:size/2,cy:size/2,r,fill:'none',stroke:s.c,strokeWidth:sw,strokeDasharray:len+' '+(C-len),strokeDashoffset:-acc*C,transform:'rotate(-90 '+(size/2)+' '+(size/2)+')',style:{transition:'stroke-dasharray .9s ease'}}));\n      acc+=f; });\n    return React.createElement('svg',{viewBox:'0 0 '+size+' '+size,style:{width:'100%',height:'100%',display:'block'}},ch);\n  }\n\n  navBtn(active){\n    return 'display:flex;align-items:center;gap:11px;width:100%;text-align:left;font-family:inherit;font-size:13.5px;font-weight:500;padding:10px 11px;margin-bottom:3px;border-radius:9px;border:none;cursor:pointer;transition:background .15s;'\n      + (active ? 'background:rgba(62,107,214,.18);color:#fff;box-shadow:inset 2px 0 0 #3E6BD6;' : 'background:transparent;color:#9fb5c0;');\n  }\n  chip(p){\n    const c=this.colorFor(p);\n    return 'display:inline-block;min-width:58px;font-family:\\'Space Grotesk\\';font-weight:700;font-size:12.5px;color:'+c+';background:'+c+'22;border:1px solid '+c+'44;padding:4px 10px;border-radius:7px;';\n  }\n\n  renderVals(){\n    const S=this.state, B=this.brands();\n    const set=(v)=>this.setState({view:v});\n\n    // counts of semaforo across all 27\n    let g=0,y=0,rr=0;\n    B.forEach(b=>['seg','pub','eng'].forEach(k=>{const p=b.m[k].pct; if(p>=100)g++; else if(p>=70)y++; else rr++;}));\n\n    // ---- nav ----\n    const navBrands = B.map(b=>({\n      name:b.name, style:this.navBtn(S.view===b.key), onClick:()=>set(b.key),\n      d0:this.colorFor(b.m.seg.pct), d1:this.colorFor(b.m.pub.pct), d2:this.colorFor(b.m.eng.pct)\n    }));\n\n    // ---- overview KPIs ----\n    const sumSeg=B.reduce((s,b)=>s+b.nSeg,0);\n    const sumPub=B.reduce((s,b)=>s+b.nPub,0);\n    const avgEng=B.reduce((s,b)=>s+b.nEng,0)/B.length;\n    const adsTotal=B.filter(b=>b.ads).length;\n    const adsSum=9003.90;\n    let invTopo=0,invMeio=0,invFim=0;\n    B.forEach(b=>{ if(b.ads){ invTopo+=this.parseBRL(b.ads.topo); invMeio+=this.parseBRL(b.ads.meio); invFim+=this.parseBRL(b.ads.fim); }});\n    const invTot=invTopo+invMeio+invFim||1;\n    const mix=this.round100([invFim/invTot*100, invMeio/invTot*100, invTopo/invTot*100]);\n    const fmtInt=(n)=>n.toLocaleString('pt-BR');\n    const kpis=[\n      {label:'Novos Seguidores', value:fmtInt(sumSeg), sub:'Realizado · Jan a Mai', accent:'#3E6BD6'},\n      {label:'Publicações', value:fmtInt(sumPub), sub:'Total no período', accent:'#3E6BD6'},\n      {label:'Engajamento Médio', value:this.fmtPct(Math.round(avgEng*10)/10), sub:'Média das '+B.length+' marcas', accent:'#34D27B'},\n      {label:'Investimento Ads', value:this.fmtBRL(adsSum), sub:adsTotal+' de '+B.length+' marcas · Meta Ads', accent:'#F4B740'},\n    ];\n\n    const semaforoDonut=this.donut([{v:g,c:this.GREEN},{v:y,c:this.YELLOW},{v:rr,c:this.RED}],52,15);\n    const semaforoLegend=[\n      {color:this.GREEN,count:g,label:'Acima da meta (≥100%)'},\n      {color:this.YELLOW,count:y,label:'Atenção (70% a 99%)'},\n      {color:this.RED,count:rr,label:'Abaixo da meta (<70%)'},\n    ];\n\n    // ---- chart (metric filter) ----\n    const mk=S.metric; const mLabel={seg:'Ganho de Seguidores',pub:'Total de Publicações',eng:'Taxa de Engajamento'}[mk];\n    const pcts=B.map(b=>b.m[mk].pct); const scaleMax=Math.max(100,...pcts);\n    const chartRows=B.map((b,i)=>{ const mm=b.m[mk]; return {\n      name:b.name, pct:mm.pct, pctLabel:this.fmtPct(mm.pct), color:this.colorFor(mm.pct),\n      barW:Math.max(2,(mm.pct/scaleMax*100))+'%', refLeft:(100/scaleMax*100)+'%',\n      real:mm.real, meta:mm.meta, hovered:S.hover===i,\n      onEnter:()=>this.setState({hover:i}), onLeave:()=>this.setState({hover:-1})\n    };});\n    const metricTabs=['seg','pub','eng'].map(k=>({\n      label:{seg:'Seguidores',pub:'Publicações',eng:'Engajamento'}[k],\n      onClick:()=>this.setState({metric:k}),\n      style:'font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:7px;border:none;cursor:pointer;transition:.15s;'+(S.metric===k?'background:#0E338E;color:#fff;':'background:transparent;color:#8FA9B6;')\n    }));\n\n    // ---- table sort ----\n    const arrow=(k)=>S.sortKey===k?(S.sortDir<0?'↓':'↑'):'';\n    const rows=B.slice().sort((a,b)=>{\n      let r; if(S.sortKey==='name') r=a.name.localeCompare(b.name); else r=a.m[S.sortKey].pct-b.m[S.sortKey].pct;\n      return r*S.sortDir;\n    });\n    const doSort=(k)=>{ if(S.sortKey===k) this.setState({sortDir:S.sortDir*-1}); else this.setState({sortKey:k,sortDir:k==='name'?1:-1}); };\n    const tableRows=rows.map(b=>({\n      name:b.name, onClick:()=>set(b.key),\n      segLabel:this.fmtPct(b.m.seg.pct), segChip:this.chip(b.m.seg.pct),\n      pubLabel:this.fmtPct(b.m.pub.pct), pubChip:this.chip(b.m.pub.pct),\n      engLabel:this.fmtPct(b.m.eng.pct), engChip:this.chip(b.m.eng.pct),\n    }));\n\n    // ---- post format mix ----\n    const PM=this.postMixData();\n    const postMixRows=B.filter(b=>PM[b.key]).map(b=>this.pmRow(b.name,PM[b.key]));\n    const postMixTotal=this.pmRow('Grupo Shark · Total',this.POSTMIX_TOTAL);\n    const postMixLegend=this.POSTMIX_LABELS.map((l,i)=>({label:l,color:this.POSTMIX_COLORS[i]}));\n\n    // ---- active brand ----\n    const active=B.find(b=>b.key===S.view);\n    const ab = active ? this.buildBrand(active) : null;\n\n    // ---- campanhas pagas (Meta Ads) ----\n    const segBelow70=B.filter(b=>b.m.seg.pct<70).length;\n    const funnel=[\n      {label:'Topo de Funil',count:1,barW:(100/9)+'%',color:'#5E7d8a'},\n      {label:'Meio de Funil',count:1,barW:(100/9)+'%',color:this.YELLOW},\n      {label:'Fim de Funil',count:9,barW:'100%',color:'#3E6BD6'},\n    ];\n\n    const titles={overview:['VISÃO GERAL','Performance Consolidada'],analise:['CAMPANHAS PAGAS','Meta Ads · Impacto nas Metas']};\n    let crumb,viewTitle;\n    if(active){ crumb='MARCA'; viewTitle=active.name; }\n    else { const t=titles[S.view]; crumb=t[0]; viewTitle=t[1]; }\n\n    return {\n      viewKey:S.view, crumb, viewTitle,\n      showApp:!S.print, showPrint:S.print,\n      showOverview:S.view==='overview', showAnalise:S.view==='analise', showBrand:!!active,\n      goOverview:()=>set('overview'), goAnalise:()=>set('analise'),\n      doPrint:()=>this.setState({print:true}),\n      exitPrint:()=>this.setState({print:false}),\n      runPrint:()=>window.print(),\n      allBrands:B.map(b=>this.buildBrand(b)),\n      printCharts:[\n        Object.assign({tab:'SEGUIDORES'}, this.chartFor('seg')),\n        Object.assign({tab:'PUBLICAÇÕES'}, this.chartFor('pub')),\n        Object.assign({tab:'ENGAJAMENTO'}, this.chartFor('eng')),\n      ],\n      navOverviewStyle:this.navBtn(S.view==='overview'), navAnaliseStyle:this.navBtn(S.view==='analise'),\n      navBrands, kpis, semaforoDonut, semaforoLegend,\n      chartRows, chartSubtitle:(mk==='eng'?'Cumprimento da meta anual · ':'Cumprimento da meta de maio · ')+mLabel, metricTabs,\n      sortName:()=>doSort('name'), sortSeg:()=>doSort('seg'), sortPub:()=>doSort('pub'), sortEng:()=>doSort('eng'),\n      arrName:arrow('name'), arrSeg:arrow('seg'), arrPub:arrow('pub'), arrEng:arrow('eng'),\n      tableRows, ab, funnel,\n      postMixRows, postMixTotal, postMixLegend,\n      redCount:rr, totalMetas:B.length*3, marcaCount:B.length,\n      adsBrandsLabel:adsTotal+'/'+B.length, segBelow70, segBelow70Label:segBelow70+' das '+B.length+' marcas',\n      adsMixFim:this.fmtPct(mix[0]), adsMixMeio:this.fmtPct(mix[1]), adsMixTopo:this.fmtPct(mix[2]),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtm
